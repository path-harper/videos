---
name: Close and Delete PR Branch

on:
  pull_request:
    types: [closed]

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Attempt to delete PR branch
        run: |
          echo "Attempting to delete branch:"
          echo "${{ github.event.pull_request.head.ref }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"
          URL="https://api.github.com/repos/${REPO}/git/refs/heads/${BRANCH}"
          curl -X DELETE \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "$URL" 2>&1 || true
          echo "Note: Branch deletion may require admin permissions"
          echo "Branch can be deleted manually via GitHub web interface"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
